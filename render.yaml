services:
  # Backend API Service
  - type: web
    name: whatsapp-bot-api
    env: python
    region: frankfurt
    plan: free
    rootDir: .
    buildCommand: |
      python -m pip install --upgrade pip
      pip install -e .
      pip install -r requirements.txt
      pip install -r project/requirements.txt
      mkdir -p surveys
    startCommand: cd project && python -m uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: PYTHONPATH
        value: /opt/render/project/src/project
      - key: ID_INSTANCE
        sync: false
      - key: API_TOKEN_INSTANCE
        sync: false
      - key: AIRTABLE_API_KEY
        sync: false
      - key: AIRTABLE_BASE_ID
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GOOGLE_SERVICE_ACCOUNT
        sync: false
      - key: LOG_LEVEL
        value: INFO
    healthCheckPath: /api/health
    autoDeploy: true

  # Frontend Static Site
  - type: web
    name: whatsapp-bot-frontend
    env: static
    region: frankfurt
    rootDir: project/frontend
    buildCommand: |
      npm cache clean --force
      rm -rf node_modules package-lock.json
      npm install --legacy-peer-deps
      npm run build
    staticPublishPath: build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: 18.0.0
      - key: REACT_APP_API_URL
        value: https://whatsapp-bot-api.onrender.com/api
      - key: CI
        value: false
    autoDeploy: true 
